      metadata:
        example: '{"tier":"premium"}'
        type: string
    type: object
  controllers.HealthResponse:
    properties:
      status:
        example: ok
        type: string
      version:
        example: 0.1.0
        type: string
    type: object
  controllers.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
