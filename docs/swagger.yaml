          type: string
        type: array
      secret:
        example: my-webhook-secret
        type: string
      url:
        example: https://example.com/webhook
        type: string
    type: object
  controllers.CreateWithdrawalRequest:
    properties:
      amount:
        example: "0.5"
        type: string
      asset:
        example: eth
        type: string
      external_user_id:
        example: user_123
        type: string
      idempotency_key:
