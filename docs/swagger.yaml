host: localhost:8080
info:
  contact:
    email: support@vault.dev
    name: API Support
  description: Multi-chain cryptocurrency custody service with deposit scanning, withdrawals,
    and webhooks
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Vault Custody Service API
  version: "1.0"
paths:
  /accounts:
    post:
      consumes:
      - application/json
      description: Creates an account and makes the caller its owner
      parameters:
      - description: Account payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new account
      tags:
      - Accounts
  /accounts/{accountId}:
    get:
      description: Returns account details. Requires account membership (injected
        by AccountContext middleware).
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Account'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get an account
      tags:
      - Accounts
    patch:
      consumes:
      - application/json
      description: Updates account name or view_all_wallets flag. Requires owner or
        admin role.
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      - description: Update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update account settings
      tags:
      - Accounts
  /accounts/{accountId}/archive:
    post:
      description: Sets account status to 'archived'. Requires owner role.
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Account'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Archive an account
      tags:
      - Accounts
  /accounts/{accountId}/freeze:
    post:
      description: Sets account status to 'frozen'. Requires owner role.
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Account'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Freeze an account
      tags:
      - Accounts
  /accounts/{accountId}/tokens:
    get:
      description: Returns all non-expired access tokens for the account. Requires
        owner or admin.
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.AccessTokenListResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List API access tokens for an account
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      description: Creates a named access token. The raw token is returned once —
        store it safely. Requires owner or admin.
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      - description: Token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateAccountTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controllers.CreateAccountTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create an API access token for an account
      tags:
      - Accounts
  /accounts/{accountId}/tokens/{tokenId}:
    delete:
      description: Deletes an access token by ID. Requires owner or admin.
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      - description: Token UUID
        in: path
        name: tokenId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke an API access token
      tags:
      - Accounts
  /accounts/{accountId}/users:
    get:
      description: Returns all active members of the account with their roles
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.AccountUserListResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List account members
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      description: Adds a user to the account with the specified role. Requires owner
        or admin.
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      - description: User and role payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.AddAccountUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AccountUser'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add a user to an account
      tags:
      - Accounts
  /accounts/{accountId}/users/{userId}:
    delete:
      description: Soft-deletes the account_user membership. Requires owner or admin.
      parameters:
      - description: Account UUID
        in: path
        name: accountId
        required: true
        type: string
      - description: User UUID to remove
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a user from an account
      tags:
      - Accounts
  /auth/2fa/verify:
    post:
      consumes:
      - application/json
      description: Validates a TOTP code or recovery code and returns full JWT tokens
      parameters:
      - description: 2FA verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.TwoFactorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      summary: Complete 2FA login
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset link to the user's email if the address
        is registered
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
